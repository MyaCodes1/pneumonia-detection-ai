name: Python Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8 nbqa
      - name: Lint notebook
        run: nbqa flake8 *.ipynb --max-line-length=120 --ignore=E302,E303,W291,W293,W391
